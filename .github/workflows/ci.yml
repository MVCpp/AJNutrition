name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI verifies code, not the packaged GUI; the Electron binary is not needed.
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  checks:
    name: Lint, format, audit (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version read from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm exec prettier --check .
      - name: Dependency audit (fail on critical)
        run: pnpm audit --audit-level critical

  test:
    name: Typecheck + tests (${{ matrix.os }})
    # Cross-OS test matrix doubles as early native-module validation for the
    # Windows (S-113) and macOS arm64 (S-114) targets.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --no-bail run typecheck
      - run: pnpm exec vitest run
        env:
          CI: 'true'

  renderer-build:
    name: Renderer production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vite build --config vite.renderer.config.ts
        working-directory: apps/desktop

  package:
    name: Package app (${{ matrix.os }})
    # Real packaged-app validation for S-113 (Windows) / S-114 (macOS arm64):
    # forge package (rebuild for Electron ABI, fuses, asar) + structural
    # verification that the native SQLite driver made it into the artifact.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      # This job DOES need the Electron binary (empty string = do not skip).
      ELECTRON_SKIP_BINARY_DOWNLOAD: ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Package
        shell: bash
        # On failure, surface the log tail as annotations (readable without
        # repo admin rights, unlike raw job logs).
        run: |
          set -o pipefail
          if ! pnpm --filter @ajnutrition/desktop package 2>&1 | tee forge-package.log; then
            echo '--- package failed; surfacing log tail as annotations ---'
            tail -n 8 forge-package.log | while IFS= read -r line; do
              echo "::error::${line}"
            done
            exit 1
          fi
      - run: node scripts/verify-package.mjs apps/desktop/out
      - uses: actions/upload-artifact@v4
        with:
          name: ajnutrition-package-${{ matrix.os }}
          path: apps/desktop/out/
          retention-days: 3
