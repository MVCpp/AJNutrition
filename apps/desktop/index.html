<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!--
      Defense-in-depth CSP (also enforced at runtime via session headers in
      src/main/security.ts). The ws://localhost:5173 entry only has effect
      during development HMR; nothing listens there in production.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws://localhost:5173; object-src 'none'; frame-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AJNutrition</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
