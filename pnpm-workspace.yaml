# Electron Forge's packaging preflight (checkPnpmConfig) requires an explicit
# pnpm hoist configuration, queried via `pnpm config get hoist-pattern` — which
# only reads this file, not .npmrc. '*' is pnpm's DEFAULT internal hoisting
# (into the virtual store), so strict isolation of direct deps is unchanged.
hoistPattern:
  - '*'

packages:
  - apps/*
  - packages/*

# Security override: tar <=7.5.18 (GHSA-23hp-3jrh-7fpw, critical DoS) arrives
# via Electron Forge's rebuild toolchain. Force the patched line everywhere.
overrides:
  tar: '>=7.5.19'

# Build scripts are default-blocked by pnpm; only these audited packages may run
# them. Any NEW package that wants a build script fails install loudly
# (ERR_PNPM_IGNORED_BUILDS) until it is reviewed and listed here.
allowBuilds:
  better-sqlite3: true
  better-sqlite3-multiple-ciphers: true
  electron: true
  electron-winstaller: true
  esbuild: true
  # macOS-only natives used by @electron-forge/maker-dmg (appdmg chain) to
  # write extended attributes / Finder aliases when building the DMG.
  fs-xattr: true
  macos-alias: true

# SECURITY NOTE (documented in docs/security/threat-model.md):
# @electron/rebuild (a fixed dependency of Electron Forge) resolves
# @electron/node-gyp from a git URL because it is not published to npm.
# pnpm's blockExoticSubdeps protection must therefore be relaxed; the lockfile
# pins the exact commit hash, which keeps the dependency auditable.
# Revisit when Electron Forge ships a registry-only dependency tree.
blockExoticSubdeps: false

onlyBuiltDependencies:
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
